-  name: install dependency airflow
   containers.podman.podman_container_exec:
     name: "{{ item }}"
     tty: true
     user: 0
     command: "apt update "
   with_items:
     - airflow-worker
     - airflow-scheduler
     - airflow-triggerer
     - airflow-dag-processor

-  name: install dependency airflow
   containers.podman.podman_container_exec:
     name: "{{ item }}"
     tty: true
     user: 0
     command: "apt install {{ airflow_dependency }} -y"
   with_items:
     - airflow-worker
     - airflow-scheduler
     - airflow-triggerer
     - airflow-dag-processor
