- name: "--PODMAN-- Airflow Directory"
  run_once: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  with_items:
    - { path: "{{local_path}}/airflow", mode: '0775'}
    - { path: "{{local_path}}/airflow/dags", mode: '0775'}
    - { path: "{{local_path}}/airflow/plugins", mode: '0775'}
    - { path: "{{local_path}}/airflow/config", mode: '0775'}
    # - { path: "{{log_path}}/airflow", mode: '777'}
    - { path: "{{local_path}}/airflow/db", mode: '0755'}
    - { path: "{{local_path}}/airflow/db/postgres", mode: '0755'}


- name: unmount an NFS volume
  become: true
  become_user: root
  ansible.posix.mount:
    src: "{{host_dwh_manager}}:{{item.path}}"
    path: "{{item.path}}"
    opts: rw,sync,hard
    state: unmounted
    fstype: nfs
  with_items:
    - {path: "{{log_path}}/airflow"}
  ignore_errors: true
  when: mounting == 1

- name: Mount an NFS volume
  become: true
  become_user: root
  ansible.posix.mount:
    src: "{{host_dwh_manager}}:{{item.path}}"
    path: "{{item.path}}"
    opts: rw,sync,hard
    state: mounted
    fstype: nfs
  with_items:
    - {path: "{{log_path}}/airflow"}
  ignore_errors: true
  when: mounting == 1


- name: "APPLICATION [SYSTEMD] NFS Run"
  become: true
  ansible.builtin.systemd_service:
    state: started
    name: "{{item}}"
  with_items:
    - nfs-server
  when: mounting == 1


