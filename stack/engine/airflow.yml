- name:  "--PODMAN-- CONTAINER Airflow Worker"
  containers.podman.podman_container:
    pod: "{{pod_name}}"
    name: airflow-worker
    image: dwh-ap-southeast-3.cr.bytepluses.com/dw-app/airflow:3.1.7
    recreate: true
    tty: true
    interactive: true
    network: "{{podman_network}}"
    healthcheck: 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d celery@${HOSTNAME} || celery --app airflow.executors.celery_executor.app inspect ping -d celery@$${HOSTNAME}'
    healthcheck_interval: "30s"
    healthcheck_timeout: "10s"
    healthcheck_retries: "5"
    healthcheck_start_period: "30s"
    command: celery worker
    ports:
      - 8793:8793
    env:
      AIRFLOW_UID: 1000
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@{{host_dwh_manager}}:{{ airflow_postgres_port }}/airflow"
      AIRFLOW__CELERY__RESULT_BACKEND: "db+postgresql://airflow:airflow@{{host_dwh_manager}}:{{ airflow_postgres_port }}/airflow"
      AIRFLOW__CELERY__BROKER_URL: "redis://:@{{host_dwh_manager}}:{{ airflow_redis_port }}/0"
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Jakarta
      AIRFLOW__API__SECRET_KEY: 'xxxxx'
      AIRFLOW__API__SECRET_KEY_CMD: 'xxxxx'
      AIRFLOW__API__SECRET_KEY_SECRET: 'xxxxx'
      AIRFLOW__API_AUTH__JWT_SECRET: 'xxxxx'
      AIRFLOW__API_AUTH__JWT_SECRET_CMD: 'xxxxx'
      AIRFLOW__API_AUTH__JWT_SECRET_SECRET: 'xxxxx'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__DAG_PROCESSOR__MIN_FILE_PROCESS_INTERVAL: 86400
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
      #      AIRFLOW__OPENLINEAGE__TRANSPORT: "{\"type\": \"http\", \"url\": \"http://{{host_dwh_manager}}:{{marquez_port}}\", \"endpoint\": \"api/v1/lineage\"}"
      #      AIRFLOW__OPENLINEAGE__NAMESPACE: 'dwh'
      _PIP_ADDITIONAL_REQUIREMENTS: "{{ airflow_plugins }} apache-airflow-fab-auth-manager"
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://{{host_dwh_manager}}:{{app_airflow_port}}/execution/'
    #      OPENLINEAGE_URL: http://dwh-manager:9911
    #      OPENLINEAGE_NAMESPACE: dwh
    volumes:
      - "{{local_path}}/airflow/dags:/opt/airflow/dags:z"
      - "{{log_path}}/airflow:/opt/airflow/logs:z"
      - "{{local_path}}/airflow/plugins:/opt/airflow/plugins:z"
      - "{{local_path}}/airflow/config:/opt/airflow/config:z"
      #      - "{{local_path}}/airflow/airflow.cfg:/opt/airflow/airflow.cfg:z"
      #    generate_systemd:
      #      path: "/home/{{ansible_user}}/.config/systemd/user/"
      #      restart_policy: always
      #      stop_timeout: 120
      #      names: true
      #      new: true


