- name: install dependency airflow
  containers.podman.podman_container_exec:
    name: "{{ item }}"
    tty: true
    user: 0
    command: "apt update "
  with_items:
    - airflow-webserver

- name: install dependency airflow
  containers.podman.podman_container_exec:
    name: "{{ item }}"
    tty: true
    user: 0
    command: "apt install {{ airflow_dependency }} -y"
  with_items:
    - airflow-webserver

- name: "Airflow Install Plugins"
  containers.podman.podman_container_exec:
    name: airflow-webserver
    user: 0
    command: "{{item}}"
  when: init == 1
  with_items:
    - "apt update"
    - "pip install {{ airflow_plugins }}"

- name: "Airflow Import Variables"
  containers.podman.podman_container_exec:
    name: airflow-webserver
    command: 'airflow variables import ./config/variables.json'
  when: init == 1

- name: "Airflow Import Connections"
  containers.podman.podman_container_exec:
    name: airflow-webserver
    command: 'airflow connections import ./config/connections.json'
  when: init == 1


